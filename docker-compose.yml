version: '3.9'

services:

  postgres:
    image: postgres:16
    container_name: partsbot_db

    environment:
      POSTGRES_USER: partsbot
      POSTGRES_PASSWORD: partsbot
      POSTGRES_DB: partsbot

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: