<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Оплата заказа</title>
  <link rel="stylesheet" href="/styles.css?v=4">
</head>
<body>
  <main class="container" style="padding: 60px 0;">
    <section class="panel panel--wide">
      <h2>Оплата заказа</h2>
      <p class="muted" id="info">Проверяем статус оплаты...</p>
      <p style="margin-top: 16px;">
        <a class="btn btn--primary" href="/#/cabinet">Вернуться в кабинет</a>
      </p>
    </section>
  </main>

  <script>
    const API_BASE = "/api";
    const USER_TOKEN_KEY = "parts_user_token";

    function getUserToken() {
      return localStorage.getItem(USER_TOKEN_KEY) || "";
    }

    async function syncPayment() {
      const params = new URLSearchParams(window.location.search);
      const orderID = params.get("order_id");
      const info = document.getElementById("info");

      if (!orderID) {
        info.textContent = "Не удалось определить заказ.";
        return;
      }

      const token = getUserToken();
      if (!token) {
        info.textContent = "Вы не авторизованы. Вернитесь в кабинет и обновите список заказов.";
        return;
      }

      try {
        const response = await fetch(`${API_BASE}/user/orders/${orderID}/payment/sync`, {
          method: "POST",
          headers: {
            "Authorization": `Bearer ${token}`
          }
        });

        const data = await response.json();

        if (!response.ok) {
          info.textContent = data.error || "Не удалось проверить статус оплаты.";
          return;
        }

        if (data.status === "succeeded") {
          info.textContent = `Заказ #${orderID} успешно оплачен.`;
          return;
        }

        if (data.status === "canceled") {
          info.textContent = `Оплата заказа #${orderID} отменена.`;
          return;
        }

        info.textContent = `Статус оплаты заказа #${orderID}: ${data.status}.`;
      } catch (e) {
        info.textContent = "Ошибка проверки статуса оплаты.";
      }
    }

    syncPayment();
  </script>
</body>
</html>
